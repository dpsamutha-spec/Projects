<div id="sub"></div>
<script>
    let sub=document.getElementById("sub")
    let form=document.getElementById("registerform")
    form.addEventListener("submit",(e)=>{
        const errors=[];
        e.preventDefault()
    let username=document.getElementById("username").value;
    let name=document.getElementById("name").value;
    let dob=document.getElementById("dob").value;
    let mobile=document.getElementById("mobile").value;
    let email=document.getElementById("email").value;
    let gender=document.querySelector("input[name='gender']:checked").value;
    let course=document.getElementById("course").value;
    let photo=document.getElementById("photo").value;
    let city=document.getElementById("city").value;
    console.log(
                 `username : ${username} , name: ${name} , dob: ${dob}, 
                 mobile: ${mobile} , email: ${email} , course: ${course},
                 photo: ${photo} , city: ${city}`
    );
    function checkUsername(usernamename){
            let chars = "1234567890@#!$%^&*()[]{}+=-_/?.><,";
            for (letter of username){ 
                if (chars.includes(letter)){
                    return "Special character and Numbers are not allowed in UserName"
                }
            }
            return "valid"
        };
         let answer1 = checkUsername(username);
        if ( answer1 != "valid"){
            errors.push(answer1);
        }
    function checkName(name){
            let chars = "1234567890@#!$%^&*()[]{}+=-_/?.><,";
            for (letter of name){ 
                if (chars.includes(letter)){
                    return "Special character and Numbers are not allowed in Name"
                }
            }
            return "valid"
        };
         let answer2 = checkName(name);
        if ( answer2 != "valid"){
            errors.push(answer2);
        }
        function checkMobile(mobile){
        if(mobile.length<10||mobile.length>10){
            return "Mobile number should not be more than 10 and not less than 10 characters"
        }else{
            return"valid"
        }
        }
        let answer4=checkMobile(mobile);
        if(answer4!="valid"){
           errors.push(answer4);
        }
       if (errors.length > 0){
            for (error of errors){
                let para = document.createElement('p');
                para.textContent = error ;
                para.style.color = "red";
                sub.appendChild(para);
            }
        }else{
            sub.textContent="Form submitted successfully!";
            sub.style.color="green";
            e.target.reset();
        }
        
    });

    
</script>
